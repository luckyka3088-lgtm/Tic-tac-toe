<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    
    <title>Tic Tac Toe Game | Play Multiplayer & Computer Mode</title>
    
    <meta name="description" content="Play an exciting Tic Tac Toe game with multiplayer and computer mode. Enjoy smooth gameplay, score tracking, and a modern UI.">

    <meta name="keywords" content="Tic Tac Toe, Tic Tac Toe Game, Multiplayer Game, Computer AI Game, HTML CSS JavaScript Game">

  
    <meta name="author" content="Lucky Kumar">

    <meta property="og:title" content="Tic Tac Toe Game">
    <meta property="og:description" content="Classic Tic Tac Toe game with multiplayer and AI mode.">
    <meta property="og:type" content="website">

    <link rel="icon" href="favicon.png" type="image/x-icon">

    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
      <h1 id = "title">Tic Tac Toe</h1>
      <h2 id = "below">classic game. Endless fun.</h2>
      
      <section id = "typeground">
        <div id = typeforeground>
          <button class = "type" id = "com">computer</button>
          <button class = "type" id = "human">human</button>
        </div>
      </section>
    </header>
    <main>
      <section id = "board">
        <div id="winLine"></div>
        <button class = "button" id = "cell0"></button>
        <button class = "button" id = "cell1"></button>
        <button class = "button" id = "cell2"></button>
        <button class = "button" id = "cell3"></button>
        <button class = "button" id = "cell4"></button>
        <button class = "button" id = "cell5"></button>
        <button class = "button" id = "cell6"></button>
        <button class = "button" id = "cell7"></button>
        <button class = "button" id = "cell8"></button>
        
      </section>
      <div id="scoreBox">
  <div class="score-col">
    <div id="X">X</div>
    <div id="Xscore">0</div>
  </div>
  
  <hr>
  
  <div class="score-col">
    <div id="O">O</div>
    <div id="Oscore">0</div>
  </div>
      </div>
      <button id = "reset">Reset</button>
    </main>
    <footer>
      <h5>Made with ❤️</h5>
      <h6> Made by <a >Lucky Kumar</a></h6>
    </footer>

    <script src="script.js"></script>
</body>
</html>
